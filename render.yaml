services:
  - type: web
    name: umsupport-api
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: HEADLESS
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_ORIGIN_REGEX
        sync: false
      - key: SITE_URL
        sync: false
      - key: SITE_USER
        sync: false
      - key: SITE_PASS
        sync: false
